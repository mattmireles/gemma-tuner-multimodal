<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎆 Whisper Training Visualizer - Watch AI Learn</title>
    
    <!-- Socket.IO for real-time communication -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <!-- Three.js for 3D graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Chart.js for 2D plots -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000000;
            color: #FFFFFF;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Animated background particles */
        #particles-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, #FF00CC, #9933CC, #0099FF) 1;
            position: relative;
            overflow: hidden;
        }
        
        .header h1 {
            font-size: 2em;
            margin: 10px 0;
            position: relative;
            display: inline-block;
        }
        
        /* Glow effect behind the text */
        .header h1::before {
            content: '🎆 Whisper Training Visualizer 🎆';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #FF00CC, #9933CC, #0099FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(20px);
            opacity: 0.8;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        /* The actual text on top */
        .header h1 span {
            position: relative;
            background: linear-gradient(135deg, #FF00CC, #9933CC, #0099FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: 1;
        }
        
        @keyframes glow {
            from { 
                filter: blur(20px);
                transform: scale(1);
            }
            to { 
                filter: blur(30px);
                transform: scale(1.05);
            }
        }
        
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 8px;
            font-size: 0.85em;
            flex-wrap: wrap;
        }
        
        .stat {
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            transition: all 0.3s;
        }
        
        .stat:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .stat-value {
            font-weight: bold;
            color: #FF00CC;
            text-shadow: 0 0 5px rgba(255, 0, 204, 0.5);
        }
        
        /* Main dashboard grid - constrained to viewport */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr); /* Evenly distribute height */
            gap: 10px;
            padding: 10px;
            max-width: 100vw;
            height: calc(100vh - 140px); /* Account for header */
            margin: 0 auto;
            overflow: hidden; /* No scrolling - everything fits */
        }
        
        .viz-panel {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px;
            backdrop-filter: blur(10px);
            position: relative;
            min-height: 0; /* Allow shrinking */
            transition: all 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        
        .viz-panel:hover {
            border: 1px solid transparent;
            border-image: linear-gradient(135deg, #FF00CC, #9933CC, #0099FF) 1;
            box-shadow: 0 0 30px rgba(255, 0, 204, 0.3);
            transform: translateY(-5px);
        }
        
        .panel-title {
            font-size: 1.1em;
            margin-bottom: 8px;
            color: #FFFFFF;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .panel-title i {
            background: linear-gradient(135deg, #FF00CC, #0099FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 3D Neural Network Container */
        #neural-network-3d {
            width: 100%;
            position: relative;
            cursor: grab;
            flex: 1;
            min-height: 0; /* Allow shrinking */
        }
        
        #neural-network-3d:active {
            cursor: grabbing;
        }
        
        /* Canvas styles */
        canvas {
            max-width: 100%;
            height: auto !important;
            flex: 1;
            min-height: 0; /* Allow shrinking */
        }
        
        /* Loss landscape specific */
        .loss-landscape {
            grid-column: span 2;
            max-width: 100%;
        }
        
        /* Attention heatmap */
        #attention-heatmap {
            width: 100%;
            position: relative;
            flex: 1;
            min-height: 0;
        }
        
        /* Token probability cloud */
        .token-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }
        
        .token {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 0, 204, 0.5);
            border-radius: 20px;
            font-size: 0.9em;
            animation: pulse 2s infinite;
            transition: all 0.3s;
            color: #FFFFFF;
        }
        
        .token:hover {
            transform: scale(1.2);
            background: rgba(255, 0, 204, 0.3);
            border-color: #FF00CC;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        /* Spectrogram display */
        #spectrogram-canvas {
            width: 100%;
            image-rendering: pixelated;
            flex: 1;
            min-height: 0;
        }
        
        /* Memory wave */
        .memory-wave {
            position: relative;
            overflow: hidden;
            flex: 1;
            min-height: 0;
        }
        
        .wave {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 100%;
            background: linear-gradient(180deg, transparent, rgba(0, 255, 136, 0.4));
            animation: wave-animation 3s infinite linear;
        }
        
        @keyframes wave-animation {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        /* Control panel */
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        
        .control-btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #FFFFFF;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }
        
        .control-btn:hover {
            border: 1px solid transparent;
            border-image: linear-gradient(135deg, #FF00CC, #0099FF) 1;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.3);
        }
        
        .control-btn.active {
            background: linear-gradient(135deg, #FF00CC, #0099FF);
            color: #FFFFFF;
            border: none;
        }
        
        /* Loading animation */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            animation: spin 2s linear infinite;
            z-index: 2000;
        }
        
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        /* Particle explosion effect */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #FF00CC;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 6px rgba(255, 0, 204, 0.8);
        }
        
        /* FPS counter */
        .fps-counter {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            font-size: 0.9em;
            z-index: 1000;
            backdrop-filter: blur(10px);
            color: #FFFFFF;
        }
        
        /* Responsive adjustments */
        @media (max-width: 1400px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
                padding: 10px;
                max-height: calc(100vh - 120px);
            }
            
            .viz-panel {
                min-height: 250px;
                max-height: 300px;
            }
            
            .loss-landscape {
                grid-column: span 1;
            }
            
            .header h1 {
                font-size: 1.5em;
            }
            
            .stats-bar {
                gap: 8px;
            }
        }
        
        /* For very large screens, use 3 columns */
        @media (min-width: 1600px) {
            .dashboard {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Background particles canvas -->
    <canvas id="particles-bg"></canvas>
    
    <!-- Loading indicator -->
    <div class="loading" id="loading">
        <i class="fas fa-spinner"></i>
    </div>
    
    <!-- FPS Counter -->
    <div class="fps-counter">
        FPS: <span id="fps-value">60</span>
    </div>
    
    <!-- Header -->
    <header class="header">
        <h1><span>🎆 Whisper Training Visualizer 🎆</span></h1>
        <div class="stats-bar">
            <div class="stat">
                <i class="fas fa-microchip"></i> Device: <span class="stat-value" id="device-name">MPS</span>
            </div>
            <div class="stat">
                <i class="fas fa-brain"></i> Parameters: <span class="stat-value" id="param-count">0</span>
            </div>
            <div class="stat">
                <i class="fas fa-clock"></i> Step: <span class="stat-value" id="step-count">0</span>
            </div>
            <div class="stat">
                <i class="fas fa-layer-group"></i> Epoch: <span class="stat-value" id="epoch-count">0</span>
            </div>
            <div class="stat">
                <i class="fas fa-tachometer-alt"></i> Speed: <span class="stat-value" id="speed">0</span> steps/s
            </div>
        </div>
    </header>
    
    <!-- Main dashboard -->
    <div class="dashboard">
        <!-- 3D Neural Network -->
        <div class="viz-panel">
            <div class="panel-title">
                <i class="fas fa-network-wired"></i>
                Neural Network Galaxy
            </div>
            <div id="neural-network-3d"></div>
        </div>
        
        <!-- Loss Landscape -->
        <div class="viz-panel loss-landscape">
            <div class="panel-title">
                <i class="fas fa-mountain"></i>
                Loss Landscape
            </div>
            <canvas id="loss-chart"></canvas>
        </div>
        
        <!-- Gradient Flow -->
        <div class="viz-panel">
            <div class="panel-title">
                <i class="fas fa-water"></i>
                Gradient Flow
            </div>
            <canvas id="gradient-chart"></canvas>
        </div>
        
        <!-- Attention Heatmap -->
        <div class="viz-panel">
            <div class="panel-title">
                <i class="fas fa-fire"></i>
                Attention Heatmap
            </div>
            <div id="attention-heatmap">
                <canvas id="attention-canvas"></canvas>
            </div>
        </div>
        
        <!-- Audio Spectrogram -->
        <div class="viz-panel">
            <div class="panel-title">
                <i class="fas fa-waveform"></i>
                Audio Spectrogram
            </div>
            <canvas id="spectrogram-canvas"></canvas>
        </div>
        
        <!-- Token Probabilities -->
        <div class="viz-panel">
            <div class="panel-title">
                <i class="fas fa-dice"></i>
                Token Probability Cloud
            </div>
            <div class="token-cloud" id="token-cloud"></div>
        </div>
        
        <!-- Memory Usage -->
        <div class="viz-panel">
            <div class="panel-title">
                <i class="fas fa-memory"></i>
                Memory Pulse
            </div>
            <div class="memory-wave">
                <div class="wave"></div>
                <canvas id="memory-chart"></canvas>
            </div>
        </div>
        
        <!-- Learning Rate -->
        <div class="viz-panel">
            <div class="panel-title">
                <i class="fas fa-adjust"></i>
                Learning Rate Dance
            </div>
            <canvas id="lr-chart"></canvas>
        </div>
    </div>
    
    <!-- Control buttons -->
    <div class="controls">
        <button class="control-btn" id="pause-btn">
            <i class="fas fa-pause"></i> Pause
        </button>
        <button class="control-btn" id="sound-btn">
            <i class="fas fa-volume-up"></i> Sound
        </button>
        <button class="control-btn" id="fullscreen-btn">
            <i class="fas fa-expand"></i> Fullscreen
        </button>
        <button class="control-btn" id="toggle-3d">
            <i class="fas fa-cube"></i> 3D
        </button>
        <button class="control-btn" id="toggle-attn">
            <i class="fas fa-fire"></i> Attention
        </button>
        <button class="control-btn" id="toggle-tokens">
            <i class="fas fa-dice"></i> Tokens
        </button>
        <button class="control-btn" id="toggle-spec">
            <i class="fas fa-waveform"></i> Spectrogram
        </button>
    </div>
    
    <!-- Load the main visualization script with cache busting -->
    <script src="/static/visualizer.js?v=3"></script>
</body>
</html>
