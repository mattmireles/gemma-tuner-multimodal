name: Extended Tests

# No automatic runs; trigger manually for a full (slow) test pass.
on:
  workflow_dispatch:

# Minimal permissions — GITHUB_TOKEN can only read repo contents.
permissions:
  contents: read

jobs:
  extended:
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: 'arm64'
          cache: 'pip'
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run full test suite (including slow)
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: |
          mkdir -p test-reports
          pytest -q -m "slow or not slow" --junitxml=test-reports/junit-extended.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: junit-extended
          path: test-reports/*.xml
