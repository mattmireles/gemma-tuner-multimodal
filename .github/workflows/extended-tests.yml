name: Extended Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  extended:
    runs-on: macos-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: 'arm64'
          cache: 'pip'
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run full test suite (including slow)
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: |
          mkdir -p test-reports
          pytest -q -m "slow or not slow" --junitxml=test-reports/junit-extended.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-extended
          path: test-reports/*.xml
