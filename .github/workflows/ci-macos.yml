name: macOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Minimal permissions — GITHUB_TOKEN can only read repo contents.
permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (uv if available, fallback to pip)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if command -v uv >/dev/null 2>&1; then
            uv pip install -r requirements.txt
          else
            pip install -r requirements.txt
          fi
          python -m pip install -e '.[dev]'
          # Install a CPU-only PyTorch so CLI imports can run in CI.
          pip install torch==2.3.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Smoke import tests
        run: |
          python - <<'PY'
          import whisper_tuner
          from whisper_tuner.cli_typer import app
          from whisper_tuner.main import main as legacy_main
          from whisper_tuner.manage import main as legacy_manage
          from whisper_tuner.scripts import evaluate
          from whisper_tuner.models.whisper.finetune import main as whisper_finetune
          print('OK: package imports')
          PY

      - name: Legacy shim smoke (help paths)
        run: |
          python main.py --help
          python manage.py --help

      - name: CLI smoke
        run: |
          whisper-tuner --help
