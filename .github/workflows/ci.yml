name: CI

# Workflow disabled.
on: []

jobs:
  lint:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'arm64'
          cache: 'pip'
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install pre-commit
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Pre-commit (ruff hooks)
        run: pre-commit run --all-files || true

  unit:
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: 'arm64'
          cache: 'pip'
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Env info
        run: |
          python - << 'PY'
          import platform; print('Platform:', platform.platform())
          try:
              import torch
              print('torch:', torch.__version__)
              print('MPS built:', torch.backends.mps.is_built())
              print('MPS available:', torch.backends.mps.is_available())
          except Exception as e:
              print('torch not importable:', e)
          PY
      - name: Run fast tests (exclude slow)
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: |
          mkdir -p test-reports
          pytest -q -m "not slow" \
            tests/test_bootstrap.py \
            tests/test_config_defaults.py \
            tests/test_cli_help.py \
            tests/test_system_check.py \
            tests/test_finetune_core_data.py \
            tests/test_finetune_core_trainer.py \
            --junitxml=test-reports/junit-${{ matrix.python-version }}.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.python-version }}
          path: test-reports/*.xml

  cli:
    runs-on: macos-latest
    timeout-minutes: 15
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'arm64'
          cache: 'pip'
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Typer import
        run: |
          python - << 'PY'
          import core.bootstrap, cli_typer
          print('cli import OK')
          PY
      - name: CLI smoke
        run: |
          whisper-tuner system-check

  lockfile-check:
    name: Verify requirements.txt up-to-date
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'arm64'
          cache: 'pip'
      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools
      - name: Check lockfile
        run: |
          pip-compile pyproject.toml --quiet --no-annotate --no-header --output-file requirements.new.txt
          python - << 'PY'
          import sys, difflib
          a = open('requirements.txt','r',encoding='utf-8').read().splitlines()
          b = open('requirements.new.txt','r',encoding='utf-8').read().splitlines()
          if a != b:
              print('requirements.txt is out of date. Run: pip-compile pyproject.toml --output-file requirements.txt')
              for l in difflib.unified_diff(a,b,fromfile='requirements.txt',tofile='requirements.new.txt'):
                  print(l)
              sys.exit(1)
          print('Lockfile is up-to-date.')
          PY
